spring.main.banner-mode=off
spring.cloud.azure.keyvault.secret.endpoint=https://busjourney-prod-kv.vault.azure.net/
spring.cloud.azure.keyvault.secret.property-source-enabled= true
spring.cloud.azure.keyvault.secret.credential.managed-identity-enabled=true
# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://busjourney-prod-mysql-server.mysql.prod.internal:3306/busjourney_prod_db?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${mysql-username:root}
spring.datasource.password=${mysql-password:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
