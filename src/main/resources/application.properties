spring.main.banner-mode=off
#spring.cloud.azure.keyvault.secret.endpoint=https://busjourney-prod-kv.vault.azure.net/
#spring.cloud.azure.keyvault.secret.property-source-enabled= true
#spring.cloud.azure.keyvault.secret.credential.managed-identity-enabled=true
# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/busjourney_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
